name: "📚 Documentation"

on:
  push:
    branches:
      - master # Changez selon votre branche principale
      - fix/2.0.0 # Changez selon votre branche principale
    paths:
      - ".github/workflows/documentation.yml"
      - "docs/**"
    tags:
      - "*"

  pull_request:
    branches:
      - master
    paths:
      - ".github/workflows/documentation.yml"
      - "docs/**"
      - "pyproject.toml"

  workflow_dispatch:

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.12"

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for proper version detection

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[docs]

      - name: 🔨 Build documentation with Sphinx
        run: |
          cd docs
          sphinx-build -b html -d _build/cache -j auto . _build/html
        env:
          SPHINXOPTS: "-W --keep-going"

      - name: Add .nojekyll file
        run: touch docs/_build/html/.nojekyll

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: documentation
          path: docs/_build/html/
          if-no-files-found: error
          retention-days: 30

  deploy:
    # Only deploy on push to main/tags, not on PRs
    # if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/'))

    runs-on: ubuntu-latest
    needs: build

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: documentation
          path: ./docs-build

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs-build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
